<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestSmart – Smart Financial Advisor</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #1f3c88, #3a7bd5);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated floating particles */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.5; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Splash card */
        .splash-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: fadeInScale 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.7); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* Logo circle */
        .logo-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00c9a7, #3a7bd5);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            box-shadow: 0 0 40px rgba(0, 201, 167, 0.5), 0 0 80px rgba(0, 201, 167, 0.2);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 40px rgba(0, 201, 167, 0.5), 0 0 80px rgba(0, 201, 167, 0.2); }
            50%       { box-shadow: 0 0 60px rgba(0, 201, 167, 0.8), 0 0 100px rgba(0, 201, 167, 0.35); }
        }

        .logo-icon {
            font-size: 56px;
            line-height: 1;
        }

        /* App name */
        .app-name {
            font-size: 52px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -1px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.8s ease 0.3s both;
        }

        .app-name span {
            background: linear-gradient(90deg, #00c9a7, #89f7e4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Tagline */
        .tagline {
            font-size: 17px;
            font-weight: 400;
            color: rgba(255, 255, 255, 0.75);
            margin-top: 10px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            animation: slideUp 0.8s ease 0.5s both;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #00c9a7, #3a7bd5);
            border-radius: 3px;
            margin: 24px auto;
            animation: expandWidth 0.8s ease 0.7s both;
        }

        @keyframes expandWidth {
            from { width: 0; opacity: 0; }
            to   { width: 60px; opacity: 1; }
        }

        /* Loading bar */
        .loading-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            animation: slideUp 0.8s ease 0.9s both;
        }

        .loading-bar-bg {
            width: 220px;
            height: 5px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 99px;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00c9a7, #89f7e4);
            border-radius: 99px;
            animation: fillBar 3s ease-in-out forwards;
        }

        @keyframes fillBar {
            0%   { width: 0%; }
            100% { width: 100%; }
        }

        .loading-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.55);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: blink 1.2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 0.55; }
            50%       { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <!-- Splash Content -->
    <div class="splash-wrapper">

        <!-- Logo -->
        <div class="logo-circle">
            <span class="logo-icon">📈</span>
        </div>

        <!-- App Name -->
        <h1 class="app-name">Invest<span>Smart</span></h1>

        <!-- Tagline -->
        <p class="tagline">Smart Financial Advisor</p>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Loading -->
        <div class="loading-wrapper">
            <div class="loading-bar-bg">
                <div class="loading-bar-fill"></div>
            </div>
            <p class="loading-text">Loading&hellip;</p>
        </div>

    </div>

    <script>
        // Generate floating particles
        const container = document.getElementById('particles');
        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.classList.add('particle');
            const size = Math.random() * 60 + 20;
            p.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                left: ${Math.random() * 100}%;
                animation-duration: ${Math.random() * 10 + 8}s;
                animation-delay: ${Math.random() * 5}s;
            `;
            container.appendChild(p);
        }

        // Redirect to login after 3 seconds
        setTimeout(function () {
            window.location.href = "/login";
        }, 3000);
    </script>

</body>
</html>
