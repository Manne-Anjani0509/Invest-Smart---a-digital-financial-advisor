<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Investment Recommendation AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1><i class="fas fa-chart-line"></i> 📊 Investment Advisor</h1>
    <p style="text-align: center; color: var(--text-muted); margin-bottom: 25px;">Enter your financial details to get a personalized investment recommendation.</p>
    
    <form action="/predict" method="POST">
        <!-- 9 Inputs -->
        <div class="form-group">
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" required value="30">
        </div>

        <div class="form-group">
            <label for="monthly_income">Monthly Income (₹):</label>
            <input type="number" id="monthly_income" name="monthly_income" required value="75000">
        </div>

        <div class="form-group">
            <label for="savings">Total Savings ($):</label>
            <input type="number" id="savings" name="savings" required value="20000">
        </div>

        <div class="form-group">
            <label for="investment_amount">Amount Willing to Invest ($):</label>
            <input type="number" id="investment_amount" name="investment_amount" required value="5000">
        </div>

        <div class="form-group">
            <label for="duration_months">Investment Duration (Months):</label>
            <input type="number" id="duration_months" name="duration_months" placeholder="Enter duration in months" min="1" max="120" required>
        </div>

        <div class="form-group">
            <label for="frequency">Investment Frequency:</label>
            <select id="frequency" name="frequency" required>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
                <option value="monthly" selected>Monthly</option>
            </select>
        </div>


        <div class="form-group">
            <label for="risk_level">Risk Tolerance Level:</label>
            <select id="risk_level" name="risk_level" required>
                <option value="Low">Low</option>
                <option value="Medium" selected>Medium</option>
                <option value="High">High</option>
            </select>
        </div>

        <div class="form-group">
            <label for="investment_mode">Investment Preference:</label>
            <select id="investment_mode" name="investment_mode" required>
                <option value="diversified" selected>Diversified Portfolio</option>
                <option value="single">Single Investment</option>
            </select>
        </div>

        <button type="submit">Get Recommendaton</button>
    </form>
    
    <div class="footer-link">
        <p>Have questions about financial terms?</p>
        <a href="/chatbot">Try our Financial Assistant Chatbot</a>
        <br style="margin: 6px 0;"><br>
        <a href="/dashboard" style="color: #1f3c88;">📊 View Investment History</a>
    </div>
</div>

</body>
</html>
